name: Release Notes Guard

# Forces a user-facing release note before anything reaches master (and thus a
# new production build / in-app update banner). A PR to master must either edit
# release-notes.json, or carry the 'skip-release-notes' label for genuinely
# internal changes (docs, refactors, CI, tests).
#
# To make this binding, mark "Release Notes Guard" as a required status check in
# the master branch protection rules.

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened, labeled, unlabeled]

jobs:
  require-release-note:
    name: Release Notes Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require release-notes.json update or skip label
        env:
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if printf ',%s,' "$LABELS" | grep -q ',skip-release-notes,'; then
            echo "✓ 'skip-release-notes' label present — internal change, no note required."
            exit 0
          fi

          if git diff --name-only "$BASE_SHA...$HEAD_SHA" | grep -qx 'release-notes.json'; then
            echo "✓ release-notes.json was updated in this PR."
            exit 0
          fi

          echo "::error::No release note for this change. Add a user-facing entry to the top of release-notes.json (EN + FI bullets), or add the 'skip-release-notes' label if this PR has nothing users would notice."
          exit 1
