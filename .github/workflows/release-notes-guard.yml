name: Release Notes Guard

# One concept: every merge to master ships a new build, and every build must tell
# users what changed. So every PR to master MUST add a brand-new entry at the TOP
# of release-notes.json (plain-language EN + FI). No exceptions, no skip label.
#
# This checks for a genuinely NEW top entry — not just that the file was touched —
# so editing the comment, tweaking an old entry, or reordering can't satisfy it.
#
# To make this binding, mark "Release Notes Guard" as a required status check in
# the master branch protection rules.

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened]

jobs:
  require-release-note:
    name: Release Notes Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require a NEW top entry in release-notes.json
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # Extract releases[0] (the entry users will see) from a given revision.
          # Note: node -e runs in a context where a top-level `return` is illegal,
          # so keep this a single try/catch with no early return.
          top_entry() {
            git show "$1:release-notes.json" 2>/dev/null | node -e '
              try {
                const s = require("fs").readFileSync(0, "utf8");
                const r = JSON.parse(s).releases;
                process.stdout.write(r && r[0] ? JSON.stringify(r[0]) : "");
              } catch { process.stdout.write(""); }
            '
          }

          NEW=$(top_entry "$HEAD_SHA")
          OLD=$(top_entry "$BASE_SHA")

          if [ -z "$NEW" ]; then
            echo "::error::release-notes.json has no top entry. Add a new entry (plain-language EN + FI bullets) at the top of releases[]."
            exit 1
          fi

          if [ "$NEW" = "$OLD" ]; then
            echo "::error::Every PR to master must add a NEW user-facing update note. The top entry of release-notes.json is unchanged — add a new entry at the TOP of releases[] (plain-language EN + FI bullets). For an internal-only change (CI, deps, refactor, docs) write something honest and user-friendly, e.g. \"Behind-the-scenes improvements\" / \"Taustaparannuksia\"."
            exit 1
          fi

          echo "✓ New top entry present in release-notes.json."
