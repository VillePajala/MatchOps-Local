name: CI

on:
  push:
    branches: [master]
  pull_request:
    # Run CI on all PRs regardless of target branch
    branches: ['**']

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linter
        run: npm run lint

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Type check
        run: npx tsc --noEmit

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run all tests
        run: CI=true npx jest --ci --maxWorkers=2 --testTimeout=30000
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        if: always()
        with:
          fail_ci_if_error: false

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build application
        run: npm run build
      
      - name: Check build output
        run: |
          if [ -d ".next" ]; then
            echo "✅ Build successful"
            echo "Build size:"
            du -sh .next/
          else
            echo "❌ Build failed - no .next directory found"
            exit 1
          fi

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run security audit (informational — all production+dev advisories)
        run: npm audit --audit-level=moderate
        continue-on-error: true

      # Gate: block the build on CRITICAL vulnerabilities in PRODUCTION dependencies.
      # Scoped tightly on purpose — `--omit=dev` ignores build/test tooling, and
      # `--audit-level=critical` ignores high/moderate/low (which are tracked by the
      # informational step above and addressed as routine maintenance, not a merge block).
      - name: Audit gate — fail on CRITICAL production vulnerabilities
        run: npm audit --omit=dev --audit-level=critical

      - name: Check for outdated packages
        run: npx npm-check-updates --errorLevel 2 || true

  # Summary job that requires all others to pass
  all-checks:
    name: All CI Checks Passed
    runs-on: ubuntu-latest
    needs: [lint, type-check, test, build, security-scan]
    if: always()
    steps:
      - name: Verify all checks passed
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: |
          echo "❌ One or more CI checks failed"
          exit 1
      
      - name: Success
        run: echo "✅ All CI checks passed successfully!"