name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review this pull request. Read the full diff with `gh pr diff`. The repository is
            checked out in the working directory - use the Read/Grep/Glob tools to inspect
            surrounding source when you need to verify a finding (do NOT try shell commands
            like cat/git for this; they are not on the allowlist). Then compose a SINGLE
            comprehensive review comment covering:
            - Bugs and correctness issues (with file:line references)
            - Security concerns
            - Performance considerations
            - Test coverage gaps
            - Code quality relative to CLAUDE.md conventions

            IMPORTANT FORMATTING RULES:
            1. Compose your ENTIRE review as ONE markdown-formatted comment. Do NOT split into multiple comments.
            2. Use proper GitHub-flavored markdown: ## headings, **bold**, `code`, tables, etc.
            3. Categorize findings by severity: Bug, Issue, Minor, Nit.
            4. End with a summary table and a clear merge recommendation.

            HOW TO POST (follow exactly - other command forms are blocked by the tool allowlist):
            1. Write the finished review body to /tmp/review-body.md using the Write tool (NOT a shell redirect).
            2. Post it with one command that begins exactly with `gh pr comment`:
               gh pr comment <PR_NUMBER> --body-file /tmp/review-body.md
            Do NOT prefix that command with cd, environment variables or command substitution, and
            do NOT pipe into it - only commands starting with `gh pr comment` pass the allowlist.
            If a command is denied, do not retry variations; re-read these instructions.

            YOU MUST ALWAYS POST THE COMMENT. Earlier review comments on this PR do NOT make
            posting unnecessary: each push needs its own posted verdict on the CURRENT head,
            because a run that ends silently is indistinguishable from a run that failed.
            If prior reviews exist, review the changes since the newest one (are its findings
            resolved? anything new?) and post that as the updated verdict - even when the
            entire verdict is "all previous findings addressed, no new findings, approve".
            Ending this session without having successfully run `gh pr comment` is a failure.

            Use the repository's CLAUDE.md for guidance on project conventions and quality bar.

          # Read/Grep/Glob: the repo IS checked out, but without read tools the agent
          # thrashes on denied file-inspection commands and (about half the time) gives
          # up without posting the review at all - a "success" run with no comment.
          claude_args: '--allowed-tools "Read,Grep,Glob,Write,Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*)"'

