name: Claude Code Review

on:
  pull_request:
    types: [opened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review this pull request. Read the full diff with `gh pr diff`. Then compose a SINGLE comprehensive review comment covering:
            - Bugs and correctness issues (with file:line references)
            - Security concerns
            - Performance considerations
            - Test coverage gaps
            - Code quality relative to CLAUDE.md conventions

            IMPORTANT FORMATTING RULES:
            1. Compose your ENTIRE review as ONE markdown-formatted comment. Do NOT split into multiple comments.
            2. Use proper GitHub-flavored markdown: ## headings, **bold**, `code`, tables, etc.
            3. Categorize findings by severity: Bug, Issue, Minor, Nit.
            4. End with a summary table and a clear merge recommendation.
            5. Post the review using a SINGLE `gh pr comment` call. Use a heredoc for the body to preserve formatting.

            Use the repository's CLAUDE.md for guidance on project conventions and quality bar.

          claude_args: '--allowed-tools "Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*)"'

